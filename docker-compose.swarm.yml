version: "3.8"

networks:
  buyza-net:
    driver: overlay

volumes:
  spark-results:
  data-usuarios:
  data-catalogo:
  data-ordenes:
  data-pagos:
  data-credito:

configs:
  init-usuarios:
    file: ./usuarios_real_backup.sql
  init-catalogo:
    file: ./catalogo_export.sql
  init-ordenes:
    file: ./ordenes_export.sql
  init-pagos:
    file: ./pagos_export.sql
  init-credito:
    file: ./credito_export.sql

services:
  db-usuarios:
    image: mysql:8.0
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: buyza_usuarios
    volumes:
      - data-usuarios:/var/lib/mysql
    configs:
      - source: init-usuarios
        target: /docker-entrypoint-initdb.d/init.sql
        mode: 0444
    networks:
      - buyza-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  db-catalogo:
    image: mysql:8.0
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: buyza_catalogo
    volumes:
      - data-catalogo:/var/lib/mysql
    configs:
      - source: init-catalogo
        target: /docker-entrypoint-initdb.d/init.sql
        mode: 0444
    networks:
      - buyza-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  db-ordenes:
    image: mysql:8.0
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: buyza_ordenes
    volumes:
      - data-ordenes:/var/lib/mysql
    configs:
      - source: init-ordenes
        target: /docker-entrypoint-initdb.d/init.sql
        mode: 0444
    networks:
      - buyza-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  db-pagos:
    image: mysql:8.0
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: buyza_pagos
    volumes:
      - data-pagos:/var/lib/mysql
    configs:
      - source: init-pagos
        target: /docker-entrypoint-initdb.d/init.sql
        mode: 0444
    networks:
      - buyza-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  db-credito:
    image: mysql:8.0
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: buyza_credito
    volumes:
      - data-credito:/var/lib/mysql
    configs:
      - source: init-credito
        target: /docker-entrypoint-initdb.d/init.sql
        mode: 0444
    networks:
      - buyza-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  ms-usuarios:
    image: buyza/ms-usuarios:latest
    environment:
      DB_HOST: db-usuarios
      DB_USER: root
      DB_PASS: ""
      DB_NAME: buyza_usuarios
      PORT: 3001
      JWT_SECRET: PassMarketplace0001
    ports:
      - "3001:3001"
    networks:
      - buyza-net
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s

  ms-catalogo:
    image: buyza/ms-catalogo:latest
    environment:
      DB_HOST: db-catalogo
      DB_USER: root
      DB_PASS: ""
      DB_NAME: buyza_catalogo
      PORT: 3002
      JWT_SECRET: PassMarketplace0001
    ports:
      - "3002:3002"
    networks:
      - buyza-net
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s

  ms-ordenes:
    image: buyza/ms-ordenes:latest
    environment:
      DB_HOST: db-ordenes
      DB_USER: root
      DB_PASS: ""
      DB_NAME: buyza_ordenes
      URL_CATALOGO: http://buyza_ms-catalogo:3002/api/catalogo
      URL_PAGOS: http://buyza_ms-pagos:3004
      PORT: 3003
      JWT_SECRET: PassMarketplace0001
    ports:
      - "3003:3003"
    networks:
      - buyza-net
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s

  ms-pagos:
    image: buyza/ms-pagos:latest
    environment:
      DB_HOST: db-pagos
      DB_USER: root
      DB_PASS: ""
      DB_NAME: buyza_pagos
      PORT: 3004
      JWT_SECRET: PassMarketplace0001
    ports:
      - "3004:3004"
    networks:
      - buyza-net
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s

  ms-credito:
    image: buyza/ms-credito:latest
    environment:
      DB_HOST: db-credito
      DB_USER: root
      DB_PASS: ""
      DB_NAME: buyza_credito
      PORT: 3005
      JWT_SECRET: PassMarketplace0001
    ports:
      - "3005:3005"
    networks:
      - buyza-net
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s

  frontend:
    image: buyza/frontend:latest
    ports:
      - "80:80"
    networks:
      - buyza-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  haproxy:
    image: haproxy:2.8
    ports:
      - "5081:5081"
      - "4001:4001"
      - "4002:4002"
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    networks:
      - buyza-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
  ms-estadisticas:
    image: buyza/ms-estadisticas:latest
    environment:
      PORT: 3006
      DB_USER: root
      DB_PASSWORD: ""
      DB_HOST_USUARIOS: db-usuarios
      DB_HOST_CATALOGO: db-catalogo
      DB_HOST_ORDENES:  db-ordenes
      DB_HOST_PAGOS:    db-pagos
      DB_HOST_CREDITO:  db-credito
    volumes:
      - spark-results:/spark-results
    ports:
      - "3006:3006"
    networks:
      - buyza-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager
